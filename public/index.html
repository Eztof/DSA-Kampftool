<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSA 4.1 – Spielleiter</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#141008;--sf:#1e1810;--sf2:#261e12;--sf3:#2e2416;
  --brd:#3a2e18;--brdg:#6a5020;
  --gold:#c9922a;--goldl:#e8b84b;--goldd:#8b6010;
  --red:#c0392b;--green:#27ae60;--blue:#2980b9;
  --text:#d4c4a0;--dim:#8a7a5a;--dim2:#5a4a2a;
  --card:#1e1810;--card-hover:#261e12;
  --overlay:radial-gradient(ellipse at 15% 10%,rgba(201,146,42,0.04),transparent 50%),radial-gradient(ellipse at 85% 90%,rgba(139,32,32,0.04),transparent 50%);
}
body.light {
  --bg:#f0ece0;--sf:#faf8f2;--sf2:#eee8da;--sf3:#e4dcd0;
  --brd:#c0aa80;--brdg:#8a6a30;
  --gold:#8b5e10;--goldl:#6a4808;--goldd:#c9922a;
  --text:#1a1208;--dim:#6a5a3a;--dim2:#9a8a6a;
  --card:#faf8f2;--card-hover:#f0e8d8;
  --overlay:none;
}
*{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Crimson Text',Georgia,serif;transition:background .3s,color .3s}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background:var(--overlay);z-index:0}
.wrap{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:0 20px 40px}

header{background:linear-gradient(180deg,var(--sf),var(--bg));border-bottom:1px solid var(--brd);padding:0 20px;position:sticky;top:0;z-index:50;box-shadow:0 4px 24px rgba(0,0,0,.4)}
.hinner{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:12px;height:56px}
.logo{font-family:'Cinzel',serif;font-size:18px;font-weight:700;color:var(--gold);letter-spacing:4px;white-space:nowrap;flex-shrink:0}
.logo::before{content:'⚔ ';text-shadow:0 0 12px var(--gold)}
.hsep{width:1px;height:28px;background:var(--brd);flex-shrink:0}
.hflex{flex:1}

/* Date widget */
.date-widget{display:flex;align-items:center;gap:6px;font-family:'Cinzel',serif}
.date-nav{width:22px;height:22px;border:1px solid var(--brd);background:var(--sf2);color:var(--dim);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .13s;flex-shrink:0}
.date-nav:hover{border-color:var(--gold);color:var(--gold)}
.date-main{display:flex;flex-direction:column;align-items:center;min-width:160px;cursor:pointer;padding:3px 8px;border:1px solid transparent;transition:border-color .13s}
.date-main:hover{border-color:var(--brd)}
.date-day{font-size:11px;color:var(--goldl);letter-spacing:2px;text-transform:uppercase}
.date-full{font-size:13px;color:var(--text);white-space:nowrap}
.date-year{font-size:10px;color:var(--dim);letter-spacing:1px}

.btn{font-family:'Cinzel',serif;font-size:8px;letter-spacing:1.5px;padding:4px 10px;border:1px solid var(--brd);background:var(--sf2);color:var(--text);cursor:pointer;transition:all .15s;text-transform:uppercase;white-space:nowrap}
.btn:hover{border-color:var(--gold);color:var(--gold)}
.btn-gold{border-color:var(--gold);color:var(--gold)}
.theme-btn{display:flex;align-items:center;gap:4px;font-family:'Cinzel',serif;font-size:8px;letter-spacing:1px;color:var(--dim);cursor:pointer;padding:4px 9px;border:1px solid var(--brd);background:var(--sf2);transition:all .2s;flex-shrink:0}
.theme-btn:hover{color:var(--text);border-color:var(--gold)}

.main-grid{display:grid;grid-template-columns:1fr 280px;gap:20px;margin-top:24px}
@media(max-width:900px){.main-grid{grid-template-columns:1fr}}

.section-title{font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.section-title::after{content:'';flex:1;height:1px;background:var(--brd)}
.module-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:20px}
.mod-card{border:1px solid var(--brd);background:var(--card);padding:16px 14px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;display:flex;flex-direction:column;gap:6px}
.mod-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--brd);transition:background .2s}
.mod-card.available:hover{border-color:var(--brdg);background:var(--card-hover);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.3)}
.mod-card.available:hover::before{background:var(--gold)}
.mod-card.soon{opacity:.55;cursor:default}
.mod-icon{font-size:22px;line-height:1}
.mod-name{font-family:'Cinzel',serif;font-size:13px;font-weight:600;color:var(--text)}
.mod-desc{font-size:12px;color:var(--dim);line-height:1.5}
.mod-badge{display:inline-block;font-family:'Cinzel',serif;font-size:8px;letter-spacing:1px;padding:2px 7px;border:1px solid;text-transform:uppercase;align-self:flex-start;margin-top:4px}
.mod-badge.ok{border-color:var(--green);color:var(--green)}
.mod-badge.wip{border-color:var(--brd);color:var(--dim2)}

.notes-section{margin-bottom:0}
.notes-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.notes-status{font-size:10px;font-family:'Cinzel',serif;color:var(--dim);letter-spacing:1px}
.notes-status.saved{color:var(--green)}
textarea.notes{width:100%;background:var(--sf);border:1px solid var(--brd);color:var(--text);padding:12px 14px;font-family:'Crimson Text',serif;font-size:14px;resize:vertical;min-height:160px;outline:none;line-height:1.7;transition:border-color .2s}
textarea.notes:focus{border-color:var(--gold)}
textarea.notes::placeholder{color:var(--dim2)}

.sidebar{display:flex;flex-direction:column;gap:16px}
.side-block{border:1px solid var(--brd);background:var(--sf);overflow:hidden}
.side-hd{padding:8px 12px;background:var(--sf2);border-bottom:1px solid var(--brd);font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;display:flex;align-items:center;gap:6px}
.side-bd{padding:10px 12px}

.dice-btns{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.dice-btn{padding:5px 8px;font-family:'Cinzel',serif;font-size:9px;border:1px solid var(--brd);background:var(--sf2);color:var(--dim);cursor:pointer;transition:all .13s;flex:1;min-width:34px;text-align:center}
.dice-btn:hover{border-color:var(--gold);color:var(--gold);background:var(--sf)}
.dice-result{background:var(--sf2);border:1px solid var(--brd);padding:8px;text-align:center;margin-bottom:8px;min-height:52px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.dice-big{font-family:'Cinzel',serif;font-size:32px;font-weight:700;line-height:1;color:var(--goldl)}
.dice-sub{font-size:10px;color:var(--dim);font-family:'Cinzel',serif;margin-top:2px}
.dice-log{max-height:100px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--brd) transparent}
.dl-entry{display:flex;justify-content:space-between;font-size:11px;padding:2px 0;border-bottom:1px solid rgba(74,56,32,.15)}
.dl-entry:last-child{border-bottom:none}
.dl-die{color:var(--dim);font-family:'Cinzel',serif;font-size:9px}
.dl-val{font-family:'Cinzel',serif;font-weight:600;color:var(--text)}
.dl-val.crit{color:var(--green)}.dl-val.fumble{color:var(--red)}
.multi-row{display:flex;gap:4px;margin-bottom:6px}
.multi-row input{flex:1;background:var(--sf2);border:1px solid var(--brd);color:var(--text);padding:4px 7px;font-family:'Crimson Text',serif;font-size:13px;outline:none;width:40px;text-align:center}
.multi-row input:focus{border-color:var(--gold)}

.save-entry{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid rgba(74,56,32,.15)}
.save-entry:last-child{border-bottom:none}
.save-name{font-family:'Cinzel',serif;font-size:11px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;color:var(--goldl)}
.save-name:hover{text-decoration:underline}
.save-meta{font-size:9px;color:var(--dim);font-family:'Cinzel',serif}
.save-load{padding:2px 7px;font-family:'Cinzel',serif;font-size:8px;border:1px solid var(--brd);background:var(--sf2);color:var(--dim);cursor:pointer;transition:all .13s}
.save-load:hover{border-color:var(--gold);color:var(--gold)}
.no-server{font-size:11px;color:var(--dim);font-style:italic;text-align:center;padding:8px}

/* Date popup */
.date-popup{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:200}
.date-popup.open{display:flex}
.date-box{background:var(--sf);border:2px solid var(--brd);padding:20px 24px;width:320px;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.date-box h3{font-family:'Cinzel',serif;font-size:13px;letter-spacing:2px;color:var(--gold);margin-bottom:14px}
.date-fields{display:grid;grid-template-columns:1fr 2fr 1fr;gap:8px;margin-bottom:14px}
.df{display:flex;flex-direction:column;gap:3px}
.df label{font-family:'Cinzel',serif;font-size:8px;letter-spacing:1.5px;color:var(--dim);text-transform:uppercase}
.df input,.df select{background:var(--sf2);border:1px solid var(--brd);color:var(--text);padding:5px 7px;font-family:'Crimson Text',serif;font-size:13px;outline:none;width:100%}
.df input:focus,.df select:focus{border-color:var(--gold)}
.df select option{background:var(--sf)}

.toast{position:fixed;bottom:20px;right:20px;background:var(--sf);border:1px solid var(--gold);padding:8px 16px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:1px;color:var(--gold);z-index:500;transform:translateY(60px);opacity:0;transition:all .3s}
.toast.show{transform:translateY(0);opacity:1}
.server-dot{width:7px;height:7px;border-radius:50%;background:var(--brd);flex-shrink:0}
.server-dot.online{background:var(--green);box-shadow:0 0 5px var(--green)}
</style>
</head>
<body>

<header>
<div class="hinner">
  <div class="logo">DSA 4.1</div>
  <div class="hsep"></div>
  <div class="date-widget">
    <button class="date-nav" onclick="shiftDay(-1)">◀</button>
    <div class="date-main" onclick="openDatePopup()" title="Datum bearbeiten">
      <div class="date-day" id="hDayName">–</div>
      <div class="date-full" id="hDateFull">– – –</div>
      <div class="date-year" id="hYear">– BZ</div>
    </div>
    <button class="date-nav" onclick="shiftDay(1)">▶</button>
  </div>
  <div class="hflex"></div>
  <div style="display:flex;align-items:center;gap:4px;font-family:'Cinzel',serif;font-size:9px;color:var(--dim)">
    <div class="server-dot" id="serverDot"></div>
    <span id="serverLbl">lokal</span>
  </div>
  <div class="theme-btn" onclick="toggleTheme()" id="themeBtn">☀ Hell</div>
</div>
</header>

<div class="wrap">
<div class="main-grid">
  <div>
    <div class="section-title">Module</div>
    <div class="module-grid" id="moduleGrid"></div>
    <div class="notes-section">
      <div class="notes-head">
        <div class="section-title" style="margin-bottom:0;flex:1">Kampagnen-Notizen</div>
        <div class="notes-status" id="notesStatus">–</div>
      </div>
      <textarea class="notes" id="notesArea" placeholder="Kampagnen-Notizen, NSC-Infos, offene Fäden, Geheimnisse … Wird automatisch gespeichert." rows="8"></textarea>
    </div>
  </div>
  <div class="sidebar">
    <div class="side-block">
      <div class="side-hd">🎲 Würfelwurf</div>
      <div class="side-bd">
        <div class="dice-btns" id="diceBtns"></div>
        <div class="dice-result">
          <div class="dice-big" id="diceResult">–</div>
          <div class="dice-sub" id="diceSub"></div>
        </div>
        <div class="multi-row">
          <input type="number" id="dCount" value="3" min="1" max="20">
          <select id="dSides" style="flex:2;background:var(--sf2);border:1px solid var(--brd);color:var(--text);padding:4px 7px;font-family:'Crimson Text',serif;font-size:12px;outline:none">
            <option value="6">W6</option><option value="20" selected>W20</option>
            <option value="4">W4</option><option value="8">W8</option>
            <option value="10">W10</option><option value="12">W12</option><option value="100">W100</option>
          </select>
          <button class="btn" onclick="rollMulti()">Würfeln</button>
        </div>
        <div style="font-family:'Cinzel',serif;font-size:9px;color:var(--dim);letter-spacing:1.5px;margin-bottom:4px;text-transform:uppercase">Letzte Würfe</div>
        <div class="dice-log" id="diceLog"></div>
      </div>
    </div>
    <div class="side-block">
      <div class="side-hd"><div class="server-dot" id="saveDot"></div> Kampf-Saves</div>
      <div class="side-bd" id="savesBody">
        <div class="no-server">Server nicht verbunden.<br>Starte server.js für Speicher-Sync.</div>
      </div>
    </div>
  </div>
</div>
</div>

<div class="date-popup" id="datePopup" onclick="if(event.target===this)closeDatePopup()">
<div class="date-box">
  <h3>⚔ AVENTURINISCHES DATUM</h3>
  <div class="date-fields">
    <div class="df"><label>Tag</label><input type="number" id="edDay" min="1" max="30"></div>
    <div class="df"><label>Monat</label><select id="edMonth"></select></div>
    <div class="df"><label>Jahr BZ</label><input type="number" id="edYear" min="0" max="9999"></div>
  </div>
  <div style="display:flex;gap:6px;justify-content:flex-end">
    <button class="btn" onclick="closeDatePopup()">Abbrechen</button>
    <button class="btn btn-gold" onclick="saveDateFromPopup()">Übernehmen</button>
  </div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';

const AV_MONTHS=[
  {n:'Praios',days:30,god:'☀'},{n:'Rondra',days:30,god:'⚔'},{n:'Efferd',days:30,god:'🌊'},
  {n:'Travia',days:30,god:'🏠'},{n:'Boron',days:30,god:'💀'},{n:'Hesinde',days:30,god:'✨'},
  {n:'Firun',days:30,god:'❄'},{n:'Tsa',days:30,god:'🌱'},{n:'Phex',days:30,god:'🗝'},
  {n:'Peraine',days:30,god:'🌾'},{n:'Ingerimm',days:30,god:'🔨'},{n:'Rahja',days:30,god:'🌹'},
  {n:'Namenlose Tage',days:5,god:'😶'},
];
const TAG_NAMEN=['Windstag','Erdstag','Markttag','Praiostag','Nachtag','Zügeltag','Götterfeiertag'];

let avDate={day:1,month:0,year:1027};
let isLight=localStorage.getItem('dsa_theme')==='light';
let diceLog=JSON.parse(localStorage.getItem('dsa_dicelog')||'[]');
let serverMode=false;
let notesSaveTimer=null;
let campaignSaveTimer=null;

const MODULES=[
  {id:'kampf',  icon:'⚔', name:'Kampfverwaltung',      desc:'Initiative, AT/PA, FK-Rechner, Karte, Statuseffekte',          href:'kampf.html',  ok:true},
  {id:'namen',  icon:'🎲', name:'Namensgenerator',       desc:'Aventurinische Namen nach Volk, Region und Geschlecht',         href:'namen.html',  ok:true},
  {id:'basar',  icon:'🛒', name:'Basar & Preisliste',    desc:'Gegenstände, Preise, Händler, Warenqualitäten',                href:null,          ok:false},
  {id:'notizen',icon:'📝', name:'Kampagnen-Journal',     desc:'Strukturierte Sitzungsnotizen, NSC-Datenbank, Quests',          href:null,          ok:false},
  {id:'regeln', icon:'📚', name:'Regelreferenz',         desc:'Manöver-Tabellen, Proben-Übersichten, Zauberlisten',            href:null,          ok:false},
  {id:'helden', icon:'🧙', name:'Heldenblatt-Verwaltung',desc:'Heldenwerte, Steigerungen, Ausrüstung, Vorteile/Nachteile',    href:null,          ok:false},
  {id:'karte',  icon:'🗺', name:'Kartenansicht',         desc:'Aventurien-Karte, eigene Markierungen, Regionen',              href:null,          ok:false},
];

// ── DATE ──
function renderDate(){
  const m=AV_MONTHS[avDate.month];
  const doy=(()=>{let t=0;for(let i=0;i<avDate.month;i++)t+=AV_MONTHS[i].days;return t+avDate.day;})();
  const wn=avDate.month===12?'Namenloser Tag':TAG_NAMEN[(doy-1)%7];
  document.getElementById('hDayName').textContent=wn;
  document.getElementById('hDateFull').textContent=`${avDate.day}. ${m.n}`;
  document.getElementById('hYear').textContent=`${avDate.year} BZ`;
}

function shiftDay(delta){
  avDate.day+=delta;
  const m=AV_MONTHS[avDate.month];
  if(avDate.day>m.days){avDate.day=1;avDate.month++;if(avDate.month>=AV_MONTHS.length){avDate.month=0;avDate.year++;}}
  if(avDate.day<1){avDate.month--;if(avDate.month<0){avDate.month=AV_MONTHS.length-1;avDate.year--;}avDate.day=AV_MONTHS[avDate.month].days;}
  renderDate();
  schedCampaignSave();
}

function openDatePopup(){
  const sel=document.getElementById('edMonth');
  sel.innerHTML=AV_MONTHS.map((m,i)=>`<option value="${i}"${i===avDate.month?' selected':''}>${m.god} ${m.n}</option>`).join('');
  document.getElementById('edDay').value=avDate.day;
  document.getElementById('edYear').value=avDate.year;
  document.getElementById('datePopup').classList.add('open');
}
function closeDatePopup(){document.getElementById('datePopup').classList.remove('open');}
function saveDateFromPopup(){
  const m=parseInt(document.getElementById('edMonth').value);
  let d=Math.max(1,Math.min(AV_MONTHS[m].days,parseInt(document.getElementById('edDay').value)||1));
  const y=parseInt(document.getElementById('edYear').value)||1027;
  avDate={day:d,month:m,year:y};
  renderDate();
  schedCampaignSave();
  closeDatePopup();
}

// ── CAMPAIGN SAVE (date + notes) ──
function schedCampaignSave(){
  clearTimeout(campaignSaveTimer);
  campaignSaveTimer=setTimeout(saveCampaign,600);
}
async function saveCampaign(){
  const data={date:avDate,notes:document.getElementById('notesArea').value};
  localStorage.setItem('dsa_campaign',JSON.stringify(data));
  if(serverMode){
    try{
      await fetch('/api/campaign',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
    }catch(e){}
  }
}
async function loadCampaign(){
  let data=null;
  if(serverMode){
    try{const r=await fetch('/api/campaign');if(r.ok)data=await r.json();}catch(e){}
  }
  if(!data){
    const raw=localStorage.getItem('dsa_campaign');
    data=raw?JSON.parse(raw):{date:{day:1,month:0,year:1027},notes:''};
  }
  avDate=data.date||{day:1,month:0,year:1027};
  document.getElementById('notesArea').value=data.notes||'';
  renderDate();
}

// ── THEME ──
function toggleTheme(){
  isLight=!isLight;
  document.body.classList.toggle('light',isLight);
  document.getElementById('themeBtn').textContent=isLight?'🌙 Dunkel':'☀ Hell';
  localStorage.setItem('dsa_theme',isLight?'light':'dark');
}

// ── MODULES ──
function renderModules(){
  document.getElementById('moduleGrid').innerHTML=MODULES.map(m=>`
    <div class="mod-card ${m.ok?'available':'soon'}" onclick="${m.ok?`window.location='${m.href}'`:`showToast('${m.name} – noch in Entwicklung')`}">
      <div class="mod-icon">${m.icon}</div>
      <div class="mod-name">${m.name}</div>
      <div class="mod-desc">${m.desc}</div>
      <div class="mod-badge ${m.ok?'ok':'wip'}">${m.ok?'Verfügbar':'In Entwicklung'}</div>
    </div>`).join('');
}

// ── NOTES ──
function initNotes(){
  const ta=document.getElementById('notesArea');
  ta.addEventListener('input',()=>{
    document.getElementById('notesStatus').textContent='● Ungespeichert';
    document.getElementById('notesStatus').classList.remove('saved');
    schedCampaignSave();
  });
}

// ── DICE ──
function renderDiceBtns(){
  document.getElementById('diceBtns').innerHTML=[4,6,8,10,12,20,100].map(n=>
    `<button class="dice-btn" onclick="rollDie(${n})">W${n}</button>`).join('');
}
function rollDie(sides){
  const r=Math.ceil(Math.random()*sides);
  document.getElementById('diceResult').textContent=r;
  document.getElementById('diceSub').textContent=`W${sides}`;
  document.getElementById('diceResult').style.color=r===1?'var(--green)':r===sides?'var(--red)':'var(--goldl)';
  diceLog.unshift({die:sides,val:r});if(diceLog.length>12)diceLog.pop();
  localStorage.setItem('dsa_dicelog',JSON.stringify(diceLog));
  renderDiceLog();
}
function rollMulti(){
  const n=Math.max(1,Math.min(20,parseInt(document.getElementById('dCount').value)||3));
  const s=parseInt(document.getElementById('dSides').value)||20;
  let total=0;const rolls=[];
  for(let i=0;i<n;i++){const r=Math.ceil(Math.random()*s);total+=r;rolls.push(r);}
  document.getElementById('diceResult').textContent=total;
  document.getElementById('diceSub').textContent=`${n}×W${s} (${rolls.join('+')})`;
  document.getElementById('diceResult').style.color='var(--goldl)';
  diceLog.unshift({die:`${n}×W${s}`,val:total});if(diceLog.length>12)diceLog.pop();
  localStorage.setItem('dsa_dicelog',JSON.stringify(diceLog));
  renderDiceLog();
}
function renderDiceLog(){
  document.getElementById('diceLog').innerHTML=diceLog.map(e=>{
    const isCrit=e.val===1,sides=typeof e.die==='number'?e.die:0,isFumble=sides>0&&e.val===sides;
    return `<div class="dl-entry"><span class="dl-die">W${e.die}</span><span class="dl-val ${isCrit?'crit':isFumble?'fumble':''}">${e.val}</span></div>`;
  }).join('');
}

// ── SERVER ──
async function detectServer(){
  try{const r=await fetch('/api/saves',{signal:AbortSignal.timeout(1500)});serverMode=r.ok;}catch{serverMode=false;}
  const dots=[document.getElementById('serverDot'),document.getElementById('saveDot')];
  dots.forEach(d=>{if(d)d.classList.toggle('online',serverMode)});
  document.getElementById('serverLbl').textContent=serverMode?'Server online':'lokal';
  await loadCampaign();
  if(serverMode)loadServerSaves();
}
async function loadServerSaves(){
  try{
    const r=await fetch('/api/saves');const saves=await r.json();
    const body=document.getElementById('savesBody');
    if(!saves.length){body.innerHTML='<div class="no-server">Noch keine gespeicherten Kämpfe.</div>';return;}
    const now=new Date();
    body.innerHTML=saves.slice(0,6).map(s=>{
      const d=new Date(s.modified);const mins=Math.floor((now-d)/60000);
      const age=mins<60?`${mins} Min.`:mins<1440?`${Math.floor(mins/60)} Std.`:`${Math.floor(mins/1440)} T.`;
      return `<div class="save-entry">
        <div class="save-name" onclick="goToKampf('${s.name}')">${s.name}</div>
        <div class="save-meta">R${s.round}·${s.combatants}K·${age}</div>
        <button class="save-load" onclick="goToKampf('${s.name}')">→</button>
      </div>`;
    }).join('');
    if(saves.length>6)body.innerHTML+=`<div style="font-size:10px;color:var(--dim);font-family:'Cinzel',serif;padding-top:4px">+${saves.length-6} weitere in der Kampfverwaltung</div>`;
  }catch{}
}
function goToKampf(saveName){sessionStorage.setItem('dsa_autoload',saveName);window.location.href='kampf.html';}

// ── TOAST ──
let toastTimer=null;
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2500);
}

// ── INIT ──
document.addEventListener('DOMContentLoaded',()=>{
  if(isLight){document.body.classList.add('light');document.getElementById('themeBtn').textContent='🌙 Dunkel';}
  renderModules();renderDiceBtns();renderDiceLog();initNotes();detectServer();
});
</script>
