<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSA 4.1 – Namensgenerator</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{--bg:#141008;--sf:#1e1810;--sf2:#261e12;--sf3:#2e2416;--brd:#3a2e18;--brdg:#6a5020;--gold:#c9922a;--goldl:#e8b84b;--red:#c0392b;--green:#27ae60;--blue:#2980b9;--text:#d4c4a0;--dim:#8a7a5a;--dim2:#5a4a2a;--overlay:radial-gradient(ellipse at 20% 10%,rgba(201,146,42,0.05),transparent 50%)}
body.light{--bg:#f0ece0;--sf:#faf8f2;--sf2:#eee8da;--sf3:#e4dcd0;--brd:#c0aa80;--brdg:#8a6a30;--gold:#8b5e10;--goldl:#6a4808;--text:#1a1208;--dim:#6a5a3a;--dim2:#9a8a6a;--overlay:none}
*{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Crimson Text',Georgia,serif;transition:background .3s,color .3s}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background:var(--overlay);z-index:0}
.app{position:relative;z-index:1;display:grid;grid-template-rows:auto 1fr;height:100vh}

/* HEADER */
header{background:linear-gradient(180deg,var(--sf),var(--bg));border-bottom:1px solid var(--brd);padding:0 20px;display:flex;align-items:center;gap:12px;height:52px;flex-shrink:0;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.logo{font-family:'Cinzel',serif;font-size:16px;font-weight:700;color:var(--gold);letter-spacing:3px}
.logo::before{content:'⚔ ';text-shadow:0 0 10px var(--gold)}
.breadcrumb{font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:var(--dim);display:flex;align-items:center;gap:6px}
.breadcrumb a{color:var(--dim);text-decoration:none;cursor:pointer;transition:color .13s}
.breadcrumb a:hover{color:var(--goldl)}
.hflex{flex:1}
.btn{font-family:'Cinzel',serif;font-size:9px;letter-spacing:1.5px;padding:5px 12px;border:1px solid var(--brd);background:var(--sf2);color:var(--text);cursor:pointer;transition:all .15s;text-transform:uppercase;white-space:nowrap}
.btn:hover{border-color:var(--gold);color:var(--gold)}
.btn-gold{border-color:var(--gold);color:var(--gold);background:var(--sf)}
.btn-gold:hover{background:var(--sf2)}
.btn-sm{padding:3px 8px;font-size:8px}
.theme-btn{display:flex;align-items:center;gap:4px;font-family:'Cinzel',serif;font-size:8px;color:var(--dim);cursor:pointer;padding:4px 9px;border:1px solid var(--brd);background:var(--sf2);transition:all .2s}
.theme-btn:hover{color:var(--text);border-color:var(--gold)}

/* MAIN LAYOUT */
.main{display:grid;grid-template-columns:280px 1fr;height:calc(100vh - 52px);overflow:hidden}
.side-panel{border-right:1px solid var(--brd);display:flex;flex-direction:column;overflow:hidden;background:var(--sf)}
.side-hd{padding:10px 13px;background:var(--sf2);border-bottom:1px solid var(--brd);font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:var(--gold);text-transform:uppercase}
.side-bd{flex:1;overflow-y:auto;padding:12px;scrollbar-width:thin;scrollbar-color:var(--brd) transparent}
.results-panel{display:flex;flex-direction:column;overflow:hidden}
.results-hd{padding:10px 16px;background:var(--sf);border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:8px;flex-shrink:0}
.results-body{flex:1;overflow-y:auto;padding:16px;scrollbar-width:thin;scrollbar-color:var(--brd) transparent}

/* Form elements */
label{font-family:'Cinzel',serif;font-size:9px;letter-spacing:1.5px;color:var(--dim);text-transform:uppercase;display:block;margin-bottom:3px}
select,input[type=number]{background:var(--sf2);border:1px solid var(--brd);color:var(--text);padding:6px 8px;font-family:'Crimson Text',serif;font-size:13px;outline:none;transition:border-color .2s;width:100%}
select:focus,input:focus{border-color:var(--gold)}
select option{background:var(--sf)}
.fg{margin-bottom:10px}

/* Gender toggle */
.gender-row{display:flex;gap:3px;margin-bottom:10px}
.gender-btn{flex:1;padding:6px 4px;font-family:'Cinzel',serif;font-size:9px;letter-spacing:1px;border:1px solid var(--brd);background:var(--sf2);color:var(--dim);cursor:pointer;text-align:center;transition:all .13s;text-transform:uppercase}
.gender-btn:hover{color:var(--text)}
.gender-btn.active.male{border-color:#2980b9;color:#2980b9;background:rgba(41,128,185,0.1)}
.gender-btn.active.female{border-color:#c0392b;color:#c0392b;background:rgba(192,57,43,0.1)}
.gender-btn.active.both{border-color:var(--gold);color:var(--gold);background:rgba(201,146,42,0.1)}

/* Count */
.count-row{display:flex;gap:4px;align-items:center;margin-bottom:10px}
.count-row label{margin:0}
.count-row input{width:56px}

/* Surname toggle */
.opt-row{display:flex;align-items:center;gap:6px;margin-bottom:8px;cursor:pointer}
.opt-row input[type=checkbox]{width:auto;accent-color:var(--gold);cursor:pointer}
.opt-row span{font-family:'Cinzel',serif;font-size:9px;letter-spacing:1px;color:var(--dim);text-transform:uppercase;cursor:pointer}

/* Name cards */
.names-section{margin-bottom:16px}
.names-section-title{font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--brd);padding-bottom:6px}
.names-section-title .icon{font-size:12px}
.name-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:6px}
.name-card{border:1px solid var(--brd);background:var(--sf);padding:10px 12px;display:flex;align-items:center;gap:8px;transition:all .13s}
.name-card:hover{border-color:var(--brdg)}
.name-text{flex:1}
.name-first{font-family:'Cinzel',serif;font-size:15px;color:var(--text)}
.name-last{font-size:12px;color:var(--dim);margin-top:2px}
.name-copy{width:26px;height:26px;display:flex;align-items:center;justify-content:center;border:1px solid var(--brd);background:var(--sf2);color:var(--dim);cursor:pointer;font-size:12px;transition:all .13s;flex-shrink:0}
.name-copy:hover{border-color:var(--gold);color:var(--gold)}
.name-copy.copied{border-color:var(--green);color:var(--green)}

/* Favorites */
.fav-list{display:flex;flex-direction:column;gap:4px}
.fav-entry{display:flex;align-items:center;gap:6px;padding:5px 8px;border:1px solid var(--brd);background:var(--sf2);font-family:'Cinzel',serif;font-size:12px}
.fav-entry span{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fav-del{width:18px;height:18px;display:flex;align-items:center;justify-content:center;border:1px solid var(--brd);background:var(--sf);color:var(--dim);cursor:pointer;font-size:9px;flex-shrink:0;transition:all .13s}
.fav-del:hover{border-color:var(--red);color:var(--red)}
.empty-fav{font-style:italic;color:var(--dim2);font-size:12px;padding:6px 0}

/* Info box */
.info-box{background:rgba(201,146,42,.05);border:1px solid rgba(201,146,42,.2);padding:8px 10px;font-size:11px;color:var(--dim);line-height:1.6;margin-bottom:10px;font-style:italic}
</style>
</head>
<body>
<div class="app">
<header>
  <div class="logo">DSA 4.1</div>
  <div class="breadcrumb"><a onclick="window.location.href='index.html'">Übersicht</a>›<span style="color:var(--goldl)">Namensgenerator</span></div>
  <div class="hflex"></div>
  <button class="btn btn-gold" onclick="generate()">🎲 Generieren</button>
  <div class="theme-btn" onclick="toggleTheme()" id="themeBtn">☀ Hell</div>
</header>
<div class="main">

<!-- SIDEBAR -->
<div class="side-panel">
  <div class="side-hd">Einstellungen</div>
  <div class="side-bd">
    <div class="fg">
      <label>Volk / Region</label>
      <select id="selKultur" onchange="onKulturChange()"></select>
    </div>
    <div class="info-box" id="kulturInfo"></div>

    <label>Geschlecht</label>
    <div class="gender-row">
      <div class="gender-btn male" id="gbMale" onclick="setGender('male')">♂ Männlich</div>
      <div class="gender-btn female" id="gbFemale" onclick="setGender('female')">♀ Weiblich</div>
      <div class="gender-btn both active" id="gbBoth" onclick="setGender('both')">⚥ Beide</div>
    </div>

    <div class="count-row">
      <label>Anzahl</label>
      <input type="number" id="nameCount" value="8" min="1" max="30" style="width:56px">
      <span style="font-size:12px;color:var(--dim)">Namen</span>
    </div>

    <div class="opt-row">
      <input type="checkbox" id="showSurname" checked>
      <span onclick="document.getElementById('showSurname').click()">Nachname / Patronym</span>
    </div>
    <div class="opt-row">
      <input type="checkbox" id="showOnly1">
      <span onclick="document.getElementById('showOnly1').click()">Nur einen Namen</span>
    </div>

    <div style="margin-top:12px;border-top:1px solid var(--brd);padding-top:12px">
      <div class="side-hd" style="padding:0;background:none;border:none;margin-bottom:8px">⭐ Favoriten</div>
      <div class="fav-list" id="favList"></div>
      <button class="btn btn-sm" style="margin-top:8px;width:100%" onclick="clearFavs()">Alle löschen</button>
    </div>
  </div>
</div>

<!-- RESULTS -->
<div class="results-panel">
  <div class="results-hd">
    <span style="font-family:'Cinzel',serif;font-size:11px;color:var(--dim);letter-spacing:2px;text-transform:uppercase" id="resultsTitle">Generierte Namen</span>
    <div style="flex:1"></div>
    <button class="btn btn-sm" onclick="generate()">⟳ Neu würfeln</button>
    <button class="btn btn-sm" onclick="copyAll()">📋 Alle kopieren</button>
  </div>
  <div class="results-body" id="resultsBody">
    <div style="color:var(--dim);font-style:italic;text-align:center;margin-top:40px">Volk auswählen und auf „Generieren" klicken.</div>
  </div>
</div>
</div>
</div>

// ── STATE ──
let kultur = 'mittelreich';
let gender = 'both';
let favorites = JSON.parse(localStorage.getItem('dsa_namen_favs') || '[]');
let isLight = localStorage.getItem('dsa_theme') === 'light';
let lastGenerated = [];

// ── INIT ──
document.addEventListener('DOMContentLoaded', () => {
  if (isLight) { document.body.classList.add('light'); document.getElementById('themeBtn').textContent = '🌙 Dunkel'; }
  buildKulturSelect();
  onKulturChange();
  renderFavs();
});

function buildKulturSelect() {
  const sel = document.getElementById('selKultur');
  // Group by type
  const groups = {
    'Mensch': ['mittelreich','thorwal','tulamiden','horasier','aranien','almadaner','norbarden','waldmensch'],
    'Elfen': ['elf_au','elf_firn'],
    'Andere Völker': ['zwerg','halbling','ork'],
  };
  for (const [grp, keys] of Object.entries(groups)) {
    const og = document.createElement('optgroup');
    og.label = grp;
    for (const k of keys) {
      const o = document.createElement('option');
      o.value = k; o.textContent = KULTUREN[k].label;
      if (k === kultur) o.selected = true;
      og.appendChild(o);
    }
    sel.appendChild(og);
  }
}

function onKulturChange() {
  kultur = document.getElementById('selKultur').value;
  const k = KULTUREN[kultur];
  document.getElementById('kulturInfo').textContent = k.info;
  document.getElementById('resultsBody').innerHTML = '<div style="color:var(--dim);font-style:italic;text-align:center;margin-top:30px">Klick auf „Generieren" für neue Namen.</div>';
}

function setGender(g) {
  gender = g;
  ['male','female','both'].forEach(x => {
    document.getElementById('gb'+x.charAt(0).toUpperCase()+x.slice(1)).classList.toggle('active', x===g);
  });
}

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function generateName(k, gend) {
  const pool = k[gend] || (gend === 'male' ? k.male : k.female);
  const first = pick(pool);
  let last = '';
  const showSurname = document.getElementById('showSurname').checked;
  const onlyOne = document.getElementById('showOnly1').checked;
  if (!onlyOne && showSurname) {
    switch(k.surnameType) {
      case 'von':
        last = pick(k.surname);
        break;
      case 'simple':
        last = pick(k.surname);
        break;
      case 'patronym': {
        // Pick a father's name from male pool
        const fatherName = pick(k.male);
        last = fatherName + (gend === 'female' ? k.patronymF : k.patronymM);
        break;
      }
      case 'patronym_arab': {
        const fatherName = pick(k.male);
        last = (gend === 'female' ? k.patronymF : k.patronymM) + ' ' + fatherName;
        break;
      }
      case 'clan':
        // Norbarden: ap (male) or ferch (female)
        const clanBase = pick(k.male);
        const prefix = gend === 'female' ? 'ferch' : 'ap';
        last = prefix + ' ' + clanBase;
        break;
      case 'titel':
        if (Math.random() > 0.4) last = pick(k.surname);
        break;
      case 'none':
      default:
        last = '';
    }
  }
  return { first, last };
}

function generate() {
  const k = KULTUREN[kultur];
  const count = Math.max(1, Math.min(30, parseInt(document.getElementById('nameCount').value) || 8));
  lastGenerated = [];
  const results = { male: [], female: [] };

  const genders = gender === 'both' ? ['male','female'] : [gender];

  for (const g of genders) {
    const n = gender === 'both' ? Math.ceil(count / 2) : count;
    for (let i = 0; i < n; i++) {
      const name = generateName(k, g);
      name.gender = g;
      results[g].push(name);
      lastGenerated.push(name);
    }
  }

  // Build HTML
  let html = '';
  const kulLabel = k.label;
  document.getElementById('resultsTitle').textContent = kulLabel;

  if (results.male.length) {
    html += `<div class="names-section">
      <div class="names-section-title"><span class="icon" style="color:#2980b9">♂</span> Männliche Namen</div>
      <div class="name-grid">
        ${results.male.map((n,i) => nameCard(n, 'm'+i)).join('')}
      </div>
    </div>`;
  }
  if (results.female.length) {
    html += `<div class="names-section">
      <div class="names-section-title"><span class="icon" style="color:#c0392b">♀</span> Weibliche Namen</div>
      <div class="name-grid">
        ${results.female.map((n,i) => nameCard(n, 'f'+i)).join('')}
      </div>
    </div>`;
  }

  document.getElementById('resultsBody').innerHTML = html;
}

function nameCard(n, id) {
  const full = n.last ? `${n.first} ${n.last}` : n.first;
  return `<div class="name-card" id="nc_${id}">
    <div class="name-text">
      <div class="name-first">${n.first}</div>
      ${n.last ? `<div class="name-last">${n.last}</div>` : ''}
    </div>
    <button class="name-copy" onclick="favAdd('${esc(n.first)}','${esc(n.last || '')}',this)" title="Zu Favoriten hinzufügen">★</button>
    <button class="name-copy" onclick="copyName('${esc(full)}',this)" title="Kopieren">📋</button>
  </div>`;
}

function esc(s) { return String(s).replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

function copyName(name, btn) {
  navigator.clipboard.writeText(name).then(() => {
    btn.textContent = '✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋'; btn.classList.remove('copied'); }, 1500);
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = name; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
  });
}

function copyAll() {
  if (!lastGenerated.length) return;
  const text = lastGenerated.map(n => n.last ? `${n.first} ${n.last}` : n.first).join('\n');
  navigator.clipboard.writeText(text).catch(() => {});
}

function favAdd(first, last, btn) {
  const full = last ? `${first} ${last}` : first;
  if (!favorites.find(f => f.full === full)) {
    favorites.push({ first, last, full, kultur });
    localStorage.setItem('dsa_namen_favs', JSON.stringify(favorites));
    renderFavs();
  }
  btn.textContent = '✓'; btn.classList.add('copied');
  setTimeout(() => { btn.textContent = '★'; btn.classList.remove('copied'); }, 1500);
}

function favRemove(idx) {
  favorites.splice(idx, 1);
  localStorage.setItem('dsa_namen_favs', JSON.stringify(favorites));
  renderFavs();
}

function clearFavs() {
  if (!favorites.length) return;
  if (!confirm('Alle Favoriten löschen?')) return;
  favorites = [];
  localStorage.setItem('dsa_namen_favs', '[]');
  renderFavs();
}

function renderFavs() {
  const el = document.getElementById('favList');
  if (!favorites.length) {
    el.innerHTML = '<div class="empty-fav">Noch keine Favoriten.<br>Klick auf ★ um Namen zu speichern.</div>';
    return;
  }
  el.innerHTML = favorites.map((f,i) => `<div class="fav-entry">
    <span title="${KULTUREN[f.kultur]?.label||f.kultur}">${f.full}</span>
    <button class="fav-del" onclick="copyFav('${esc(f.full)}')" title="Kopieren">📋</button>
    <button class="fav-del" onclick="favRemove(${i})" title="Entfernen">✕</button>
  </div>`).join('');
}

function copyFav(name) {
  navigator.clipboard.writeText(name).catch(() => {});
}

function toggleTheme() {
  isLight = !isLight;
  document.body.classList.toggle('light', isLight);
  document.getElementById('themeBtn').textContent = isLight ? '🌙 Dunkel' : '☀ Hell';
  localStorage.setItem('dsa_theme', isLight ? 'light' : 'dark');
}
</script>
